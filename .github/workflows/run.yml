name: YouTube Bot

on:
  schedule:
    # 01:00 UTC = 06:00 AM PKT
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  make-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Dependencies
  run: pip install gtts pillow moviepy pytrends requests

      - name: Run bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python bot.py

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: |
            final_video.mp4
            thumbnail.jpg
            metadata.txt
          retention-days: 7
